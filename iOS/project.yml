name: passportpages
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  passportpages:
    type: application
    platform: iOS
    sources: [passportpages]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.passportpages
        INFOPLIST_FILE: passportpages/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: passportpages/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleDisplayName: Passport Pages
  passportpagesTests:
    type: bundle.unit-test
    platform: iOS
    sources: [passportpagesTests]
    dependencies:
      - target: passportpages    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

  passportpagesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [passportpagesUITests]
    dependencies:
      - target: passportpages    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  passportpages:
    build:
      targets:
        passportpages: all
    test:
      targets:
        - passportpagesTests
        - passportpagesUITests
